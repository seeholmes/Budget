<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Budget">
  <title>Family Budget</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #1c1c1e;
      --text2: #6c6c70;
      --text3: #aeaeb2;
      --sep: #e5e5ea;
      --blue: #007aff;
      --purple: #af52de;
      --green: #34c759;
      --red: #ff3b30;
      --orange: #ff9500;
      --yellow: #ffcc00;
      --tab-bg: rgba(249,249,249,0.94);
      --header-bg: rgba(242,242,247,0.94);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --card: #2c2c2e;
        --text: #ffffff;
        --text2: #8e8e93;
        --text3: #48484a;
        --sep: #38383a;
        --tab-bg: rgba(28,28,30,0.94);
        --header-bg: rgba(28,28,30,0.94);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      overflow-x: hidden;
    }
    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      padding: calc(var(--safe-top) + 12px) 16px 12px;
      border-bottom: 0.5px solid var(--sep);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .hdr-btn {
      background: none; border: none; color: var(--blue);
      font-size: 17px; font-family: inherit; cursor: pointer;
      padding: 4px 0; min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: flex-end;
    }
    /* MAIN SCROLL AREA */
    main {
      padding-bottom: calc(var(--safe-bottom) + 74px);
      min-height: calc(100dvh - 50px);
    }
    /* BOTTOM TAB BAR */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--tab-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid var(--sep);
      display: flex;
      padding-bottom: var(--safe-bottom);
      z-index: 100;
    }
    .tab-btn {
      flex: 1; background: none; border: none;
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 4px 4px; gap: 3px;
      cursor: pointer; color: var(--text3); font-family: inherit;
      min-height: 50px;
    }
    .tab-btn.active { color: var(--blue); }
    .tab-btn svg { width: 24px; height: 24px; }
    .tab-btn span { font-size: 10px; font-weight: 500; }
    /* SECTION LABEL */
    .section-label {
      font-size: 13px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 20px 16px 6px;
    }
    /* CARD LIST */
    .card-list {
      background: var(--card);
      border-radius: 12px;
      margin: 0 16px;
      overflow: hidden;
    }
    .card-list + .card-list { margin-top: 0; }
    .list-row {
      display: flex; align-items: center;
      padding: 12px 16px; gap: 12px;
      border-bottom: 0.5px solid var(--sep);
      min-height: 52px;
    }
    .list-row:last-child { border-bottom: none; }
    .row-icon {
      width: 36px; height: 36px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 17px;
    }
    .row-main { flex: 1; min-width: 0; }
    .row-title { font-size: 16px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-sub { font-size: 13px; color: var(--text2); margin-top: 1px; }
    .row-right { text-align: right; flex-shrink: 0; }
    .row-amount { font-size: 16px; font-weight: 500; }
    .row-badge {
      font-size: 11px; font-weight: 600; padding: 2px 7px;
      border-radius: 20px; margin-top: 3px; display: inline-block;
    }
    .badge-papa { background: rgba(0,122,255,0.12); color: var(--blue); }
    .badge-mama { background: rgba(175,82,222,0.12); color: var(--purple); }
    .badge-due { background: rgba(255,59,48,0.12); color: var(--red); }
    .badge-soon { background: rgba(255,149,0,0.12); color: var(--orange); }
    .badge-ok { background: rgba(52,199,89,0.12); color: var(--green); }
    .badge-yearly { background: rgba(255,204,0,0.12); color: #b8860b; }
    /* SUMMARY CARDS */
    .summary-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 16px 16px 0;
    }
    .summary-card {
      background: var(--card); border-radius: 14px; padding: 14px;
    }
    .summary-card.papa { border-top: 3px solid var(--blue); }
    .summary-card.mama { border-top: 3px solid var(--purple); }
    .sc-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); margin-bottom: 6px; }
    .sc-name { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
    .sc-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
    .sc-row.total {
      border-top: 0.5px solid var(--sep); margin-top: 6px;
      padding-top: 6px; font-weight: 600; font-size: 14px;
    }
    .sc-row.total .pos { color: var(--green); }
    .sc-row.total .neg { color: var(--red); }
    /* WIDE CARD */
    .wide-card {
      background: var(--card); border-radius: 14px;
      margin: 12px 16px 0; padding: 14px;
    }
    .wide-card-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .wc-row { display: flex; justify-content: space-between; align-items: center; font-size: 15px; padding: 5px 0; border-bottom: 0.5px solid var(--sep); }
    .wc-row:last-child { border-bottom: none; }
    .wc-row .label { color: var(--text); }
    .wc-row .val { font-weight: 500; }
    /* FILTER ROW */
    .filter-row {
      display: flex; gap: 8px; padding: 12px 16px 0; overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      background: var(--card); border: 1.5px solid var(--sep);
      border-radius: 20px; padding: 6px 14px;
      font-size: 14px; font-weight: 500; color: var(--text2);
      white-space: nowrap; cursor: pointer; font-family: inherit;
      min-height: 36px;
    }
    .filter-chip.active { background: var(--blue); border-color: var(--blue); color: white; }
    /* EDIT INPUT */
    .edit-input {
      background: var(--bg); border: 1.5px solid var(--blue);
      border-radius: 8px; padding: 6px 10px;
      font-size: 15px; font-family: inherit; color: var(--text);
      width: 100px; text-align: right;
    }
    /* SETTINGS */
    .settings-group { margin: 0 16px; background: var(--card); border-radius: 12px; overflow: hidden; }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 0.5px solid var(--sep); gap: 12px;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row label { font-size: 16px; }
    .settings-row .hint { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .btn-danger {
      background: var(--red); color: white; border: none;
      border-radius: 12px; padding: 14px; font-size: 16px;
      font-family: inherit; font-weight: 500; cursor: pointer;
      width: 100%; margin: 0 16px; width: calc(100% - 32px);
    }
    /* EMPTY */
    .empty { text-align: center; color: var(--text2); padding: 40px 16px; font-size: 15px; }
    /* CHEVRON */
    .chevron { color: var(--text3); font-size: 13px; margin-left: 4px; }
    /* FORM */
    .add-form { padding: 14px 16px; border-top: 0.5px solid var(--sep); background: var(--bg); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .form-grid.full { grid-template-columns: 1fr; }
    .form-field { display: flex; flex-direction: column; gap: 4px; }
    .form-label { font-size: 12px; color: var(--text2); font-weight: 500; padding-left: 2px; }
    .form-input, .form-select {
      background: var(--card); border: 1.5px solid var(--sep);
      border-radius: 8px; padding: 9px 10px;
      font-size: 15px; font-family: inherit; color: var(--text); width: 100%;
    }
    .form-input:focus, .form-select:focus { border-color: var(--blue); outline: none; }
    .form-select { -webkit-appearance: none; appearance: none; }
    .form-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-save { flex:1; background: var(--blue); color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-family: inherit; font-weight: 600; cursor: pointer; }
    .btn-cancel { background: var(--sep); color: var(--text); border: none; border-radius: 10px; padding: 12px 18px; font-size: 15px; font-family: inherit; font-weight: 500; cursor: pointer; }
    .btn-add-row { width: 100%; background: none; border: none; color: var(--blue); font-size: 16px; font-family: inherit; padding: 13px 16px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .del-btn { background: none; border: none; color: var(--red); font-size: 20px; cursor: pointer; padding: 4px 8px; line-height: 1; flex-shrink: 0; }
  </style>
</head>
<body>
<div id="app">
  <header class="header">

      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      <span>Settings</span>
    </button>
  </nav>
</div>
<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const DEFAULTS = {

    { id:17, name:'Hagerty Insurance',amount:62,   dueDay:1,  person:'papa', freq:'yearly',  cat:'insurance', dueMonth:7,  note:'Paid yearly in July' },
    { id:18, name:'Grundy Insurance', amount:25,   dueDay:1,  person:'papa', freq:'yearly',  cat:'insurance', dueMonth:8,  note:'Paid yearly in August' },
    { id:19, name:'Landscaping',      amount:100,  dueDay:0,  person:'mama', freq:'monthly', cat:'home',      note:'Divided into weekly payments' },
    { id:20, name:'Groceries / Food', amount:2000, dueDay:0,  person:'mama', freq:'monthly', cat:'food',      note:'' },
    { id:21, name:'Antac',            amount:20,   dueDay:0,  person:'mama', freq:'monthly', cat:'health',    note:'' },
    { id:22, name:'Tech Subs',        amount:20,   dueDay:0,  person:'mama', freq:'monthly', cat:'tech',      note:'' },
  ],
  subscriptions: [
    { id:1,  name:'iCloud',       amount:10, dueDay:1,  freq:'monthly', cat:'cloud'   },
    { id:2,  name:'Ford',         amount:10, dueDay:1,  freq:'monthly', cat:'auto'    },

    { id:4,  name:'Spotify',      amount:22, dueDay:15, freq:'monthly', cat:'media'   },

    { id:6,  name:'Netflix',      amount:15, dueDay:20, freq:'monthly', cat:'media'   },
    { id:7,  name:'Photobucket',  amount:8,  dueDay:23, freq:'monthly', cat:'photo'   },
    { id:8,  name:'Hulu',         amount:10, dueDay:24, freq:'monthly', cat:'media'   },
    { id:9,  name:'ChatGPT',      amount:20, dueDay:17, freq:'monthly', cat:'ai'      },
    { id:10, name:'Claude',       amount:20, dueDay:17, freq:'monthly', cat:'ai'      },
    { id:11, name:'Grok',         amount:30, dueDay:25, freq:'monthly', cat:'ai'      },
    { id:12, name:'Fantasy Pros', amount:10, dueDay:0,  freq:'monthly', cat:'sports'  },
    { id:13, name:'Recraft',      amount:10, dueDay:1,  freq:'yearly',  cat:'design', dueMonth:2 },
    { id:14, name:'MLB',          amount:17, dueDay:1,  freq:'yearly',  cat:'sports', dueMonth:4 },
    { id:15, name:'myfitnesspal', amount:7,  dueDay:1,  freq:'yearly',  cat:'health', dueMonth:6 },
  ]
};

let data = (() => {
  try { return JSON.parse(localStorage.getItem('budget_v1')) || JSON.parse(JSON.stringify(DEFAULTS)); }
  catch(e) { return JSON.parse(JSON.stringify(DEFAULTS)); }
})();

function save() { localStorage.setItem('budget_v1', JSON.stringify(data)); }

// ─── UTILS ──────────────────────────────────────────────────────────────────
const fmt = n => '$' + Math.round(Math.abs(n)).toLocaleString('en-US');
const fmtSigned = n => (n < 0 ? '–' : '') + fmt(n);

const CAT_ICONS = {
  housing:'🏠', utilities:'⚡', auto:'🚗', insurance:'🛡️', health:'💪',
  food:'🛒', tech:'💻', debt:'💳', savings:'🏦', home:'🔧',
  misc:'📦', media:'📺', photo:'📷', cloud:'☁️', ai:'🤖',
  sports:'⚽', design:'🎨'
};

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function daysUntil(dueDay, dueMonth) {
  const now = new Date();
  const today = now.getDate();
  const thisMonth = now.getMonth() + 1;
  const thisYear = now.getFullYear();

  if (dueMonth) {
    // Yearly bill
    let targetYear = thisYear;
    if (dueMonth < thisMonth || (dueMonth === thisMonth && dueDay < today)) targetYear++;
    const target = new Date(targetYear, dueMonth - 1, dueDay || 1);
    return Math.ceil((target - now) / 86400000);
  }
  if (!dueDay) return null;
  let target = new Date(thisYear, thisMonth - 1, dueDay);
  if (dueDay < today) target = new Date(thisYear, thisMonth, dueDay);
  return Math.ceil((target - now) / 86400000);
}

function dueBadge(days) {
  if (days === null) return '';
  if (days <= 0)  return `<span class="row-badge badge-due">Due today</span>`;
  if (days <= 3)  return `<span class="row-badge badge-due">Due in ${days}d</span>`;
  if (days <= 7)  return `<span class="row-badge badge-soon">Due in ${days}d</span>`;
  if (days <= 14) return `<span class="row-badge badge-ok">In ${days}d</span>`;
  return `<span class="row-badge" style="background:rgba(142,142,147,0.12);color:var(--text2)">Day ${dueDay}</span>`;
}

function dueLabel(bill) {
  if (bill.freq === 'yearly') return `${MONTHS[bill.dueMonth-1]} ${bill.dueDay || 1}`;
  if (!bill.dueDay) return 'Various';
  const sfx = ['','st','nd','rd'];
  const d = bill.dueDay;
  return d + (sfx[d] || 'th');
}

function monthlyEquiv(bill) {
  return bill.amount; // all amounts are already monthly (yearly bills store the monthly average)
}

function billsFor(person) {
  return data.bills.filter(b => b.person === person);
}

function totalMonthly(person) {
  return billsFor(person).reduce((s, b) => s + monthlyEquiv(b), 0);
}

// Returns positive if papa sends to mama, negative if mama sends to papa
function calcExchange() {
  const papaNet = data.income.papa - totalMonthly('papa');
  const mamaNet = data.income.mama - totalMonthly('mama');
  return (papaNet - mamaNet) / 2;
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentTab = 'home';
let editMode = false;
let billFilter = 'all';
let addingBill = false;
let addingSub = false;
let editingBillId = null;
let editingSubId = null;

function switchTab(tab) {
  currentTab = tab;
  editMode = false;
  billFilter = 'all';
  addingBill = false;
  addingSub = false;
  editingBillId = null;
  editingSubId = null;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('edit-btn').textContent = 'Edit';
  render();
}

function toggleEdit() {
  editMode = !editMode;
  document.getElementById('edit-btn').textContent = editMode ? 'Done' : 'Edit';
  render();
}

// ─── RENDER HOME ─────────────────────────────────────────────────────────────
function renderHome() {
  const now = new Date();
  const papaIncome = data.income.papa;
  const mamaIncome = data.income.mama;
  const exchange = calcExchange(); // positive = papa→mama, negative = mama→papa
  const equalBal = (data.income.papa + data.income.mama - totalMonthly('papa') - totalMonthly('mama')) / 2;
  const papaBal = equalBal;
  const mamaBal = equalBal;

  // Upcoming bills this week (next 7 days)
  const upcoming = data.bills
    .filter(b => b.freq === 'monthly' && b.dueDay)
    .map(b => ({ ...b, days: daysUntil(b.dueDay, null) }))
    .filter(b => b.days !== null && b.days <= 7)
    .sort((a, b) => a.days - b.days);

  const upcomingYearly = data.bills
    .filter(b => b.freq === 'yearly')
    .map(b => ({ ...b, days: daysUntil(b.dueDay, b.dueMonth) }))
    .filter(b => b.days !== null && b.days <= 30)
    .sort((a, b) => a.days - b.days);

  let html = `<div style="padding:16px 16px 0">
    <div style="font-size:22px;font-weight:700;letter-spacing:-0.5px">${MONTHS_FULL[now.getMonth()]} ${now.getFullYear()}</div>
    <div style="font-size:14px;color:var(--text2);margin-top:2px">Monthly Budget Overview</div>
  </div>`;

  // Summary cards
  html += `<div class="summary-row">`;
  for (const [person, income, bal, cls] of [
    ['Papa', papaIncome, papaBal, 'papa'],
    ['Mama', mamaIncome, mamaBal, 'mama']
  ]) {
    const color = cls === 'papa' ? 'var(--blue)' : 'var(--purple)';
    const bills = totalMonthly(cls);
    const xferLabel = cls === 'papa'
      ? (exchange >= 0 ? `Sends ${fmt(exchange)}` : `Receives ${fmt(-exchange)}`)
      : (exchange >= 0 ? `Receives ${fmt(exchange)}` : `Sends ${fmt(-exchange)}`);
    const xferColor = (cls === 'papa') === (exchange >= 0) ? 'var(--red)' : 'var(--green)';
    html += `<div class="summary-card ${cls}">
      <div class="sc-label" style="color:${color}">${data.names[cls]}</div>
      <div class="sc-row"><span>Income/mo</span><span>${fmt(income)}</span></div>
      <div class="sc-row"><span>Bills</span><span style="color:var(--red)">–${fmt(bills)}</span></div>
      <div class="sc-row"><span>Transfer</span><span style="color:${xferColor};font-size:12px">${xferLabel}</span></div>
      <div class="sc-row total">
        <span>Balance</span>
        <span class="pos">${fmt(bal)}</span>
      </div>
    </div>`;
  }
  html += `</div>`;

  // Household total
  const totalIncome = papaIncome + mamaIncome;
  const totalExp = totalMonthly('papa') + totalMonthly('mama');
  const totalBal = totalIncome - totalExp;
  html += `<div class="wide-card">
    <div class="wide-card-title">Household Monthly</div>
    <div class="wc-row"><span class="label">Combined Income</span><span class="val">${fmt(totalIncome)}</span></div>
    <div class="wc-row"><span class="label">Total Expenses</span><span class="val" style="color:var(--red)">–${fmt(totalExp)}</span></div>
    <div class="wc-row"><span class="label">${exchange >= 0 ? data.names.papa+' → '+data.names.mama : data.names.mama+' → '+data.names.papa}</span><span class="val" style="color:var(--text2)">${fmt(Math.abs(exchange))}</span></div>
    <div class="wc-row" style="font-weight:600">
      <span class="label">Net Balance</span>
      <span class="val" style="color:${totalBal >= 0 ? 'var(--green)' : 'var(--red)'}">${fmt(totalBal)}</span>
    </div>
  </div>`;

  // Upcoming this week
  if (upcoming.length > 0 || upcomingYearly.length > 0) {
    html += `<div class="section-label">Upcoming</div><div class="card-list">`;
    for (const b of upcoming) {
      const color = b.person === 'papa' ? 'var(--blue)' : 'var(--purple)';
      const urgency = b.days <= 0 ? 'var(--red)' : b.days <= 3 ? 'var(--orange)' : 'var(--green)';
      html += `<div class="list-row">
        <div class="row-icon" style="background:rgba(${b.person==='papa'?'0,122,255':'175,82,222'},0.1)">${CAT_ICONS[b.cat]||'📋'}</div>
        <div class="row-main">
          <div class="row-title">${b.name}</div>
          <div class="row-sub" style="color:${color}">${data.names[b.person]} · Due ${dueLabel(b)}</div>
        </div>
        <div class="row-right">
          <div class="row-amount">${fmt(b.amount)}</div>
          <div style="font-size:12px;color:${urgency};font-weight:600;text-align:right">${b.days <= 0 ? 'TODAY' : `in ${b.days}d`}</div>
        </div>
      </div>`;
    }
    for (const b of upcomingYearly) {
      html += `<div class="list-row">
        <div class="row-icon" style="background:rgba(255,204,0,0.15)">${CAT_ICONS[b.cat]||'📋'}</div>
        <div class="row-main">
          <div class="row-title">${b.name}</div>
          <div class="row-sub" style="color:#b8860b">Yearly · ${MONTHS[b.dueMonth-1]} ${b.dueDay}</div>
        </div>
        <div class="row-right">
          <div class="row-amount">${fmt(b.amount)}</div>
          <div style="font-size:12px;color:var(--orange);font-weight:600;text-align:right">in ${b.days}d</div>
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  return html;
}

// ─── RENDER BILLS ─────────────────────────────────────────────────────────────
function renderBills() {
  let bills = [...data.bills];
  if (billFilter !== 'all') bills = bills.filter(b => b.person === billFilter);

  const monthly = bills.filter(b => b.freq === 'monthly').sort((a,b) => {
    if (!a.dueDay && !b.dueDay) return 0;
    if (!a.dueDay) return 1;
    if (!b.dueDay) return -1;
    return a.dueDay - b.dueDay;
  });
  const yearly = bills.filter(b => b.freq === 'yearly').sort((a,b) => a.dueMonth - b.dueMonth);

  const totalM = bills.filter(b=>b.freq==='monthly').reduce((s,b)=>s+b.amount,0);
  const totalY = bills.filter(b=>b.freq==='yearly').reduce((s,b)=>s+b.amount,0);

  let html = `<div class="filter-row">
    ${['all','papa','mama'].map(f=>`<button class="filter-chip${billFilter===f?' active':''}" onclick="setBillFilter('${f}')">${f==='all'?'All Bills':data.names[f]}</button>`).join('')}
  </div>`;

  html += `<div class="section-label">Monthly Bills</div><div class="card-list">`;
  for (const b of monthly) {
    const days = b.dueDay ? daysUntil(b.dueDay, null) : null;
    const personColor = b.person === 'papa' ? 'var(--blue)' : 'var(--purple)';
    const daysText = days !== null
      ? (days <= 0 ? '<span style="color:var(--red);font-weight:600;font-size:12px">TODAY</span>'
        : days <= 3 ? `<span style="color:var(--orange);font-weight:600;font-size:12px">in ${days}d</span>`
        : days <= 7 ? `<span style="color:var(--green);font-weight:600;font-size:12px">in ${days}d</span>`
        : `<span style="color:var(--text3);font-size:12px">day ${b.dueDay}</span>`)
      : `<span style="color:var(--text3);font-size:12px">various</span>`;
    html += `<div class="list-row">
      <div class="row-icon" style="background:rgba(${b.person==='papa'?'0,122,255':'175,82,222'},0.1)">${CAT_ICONS[b.cat]||'📋'}</div>
      <div class="row-main">
        <div class="row-title">${b.name}</div>
        <div class="row-sub" style="color:${personColor}">${data.names[b.person]}${b.note ? ' · <span style="color:var(--text2)">'+b.note+'</span>' : ''}</div>
      </div>
      <div class="row-right">
        ${editMode
          ? `<input class="edit-input" type="number" value="${b.amount}" onchange="updateBill(${b.id},'amount',+this.value)" inputmode="decimal">`
          : `<div class="row-amount">${fmt(b.amount)}</div>`}
        <div style="text-align:right">${daysText}</div>
      </div>
    </div>`;
  }
  html += `<div class="list-row" style="background:rgba(0,0,0,0.02)">
    <div class="row-main" style="font-weight:600">Monthly Total</div>
    <div class="row-right"><div class="row-amount" style="color:var(--red)">${fmt(totalM)}</div></div>
  </div></div>`;

  if (yearly.length) {
    html += `<div class="section-label">Yearly Bills</div><div class="card-list">`;
    for (const b of yearly) {
      const days = daysUntil(b.dueDay, b.dueMonth);
      html += `<div class="list-row">
        <div class="row-icon" style="background:rgba(255,204,0,0.15)">${CAT_ICONS[b.cat]||'📋'}</div>
        <div class="row-main">
          <div class="row-title">${b.name}</div>
          <div class="row-sub" style="color:#b8860b">Yearly · Paid in ${MONTHS[b.dueMonth-1]} · ${fmt(b.amount * 12)} annual</div>
        </div>
        <div class="row-right">
          ${editMode
            ? `<input class="edit-input" type="number" value="${b.amount}" onchange="updateBill(${b.id},'amount',+this.value)" inputmode="decimal">`
            : `<div class="row-amount">${fmt(b.amount)}</div>`}
          <div style="text-align:right;font-size:12px;color:${days<=30?'var(--orange)':'var(--text3)'}">in ${days}d</div>
        </div>
      </div>`;
    }
    html += `<div class="list-row" style="background:rgba(0,0,0,0.02)">
      <div class="row-main" style="font-weight:600">Yearly Total</div>
      <div class="row-right"><div class="row-amount" style="color:var(--red)">${fmt(totalY)}</div>
        <div style="font-size:12px;color:var(--text2);text-align:right">~${fmt(totalY/12)}/mo</div>
      </div>
    </div></div>`;
  }

  return html;
}

// ─── RENDER SUBS ─────────────────────────────────────────────────────────────
function renderSubs() {
  const monthly = data.subscriptions.filter(s=>s.freq==='monthly').sort((a,b)=>a.dueDay-b.dueDay);
  const yearly  = data.subscriptions.filter(s=>s.freq==='yearly').sort((a,b)=>a.dueMonth-b.dueMonth);
  const totalM  = monthly.reduce((s,x)=>s+x.amount,0);
  const totalY  = yearly.reduce((s,x)=>s+x.amount,0);
  const grandMo = totalM + totalY;

  let html = `<div class="section-label">Monthly Subscriptions</div><div class="card-list">`;
  for (const s of monthly) {
    const days = s.dueDay ? daysUntil(s.dueDay, null) : null;
    const daysText = days !== null
      ? (days <= 0 ? `<span style="color:var(--red);font-size:12px;font-weight:600">TODAY</span>`
        : days <= 3 ? `<span style="color:var(--orange);font-size:12px;font-weight:600">in ${days}d</span>`
        : `<span style="color:var(--text3);font-size:12px">day ${s.dueDay}</span>`)
      : `<span style="color:var(--text3);font-size:12px">monthly</span>`;
    html += `<div class="list-row">
      <div class="row-icon" style="background:rgba(0,122,255,0.1)">${CAT_ICONS[s.cat]||'📱'}</div>
      <div class="row-main">
        <div class="row-title">${s.name}</div>
      </div>
      <div class="row-right">
        ${editMode
          ? `<input class="edit-input" type="number" value="${s.amount}" onchange="updateSub(${s.id},'amount',+this.value)" inputmode="decimal">`
          : `<div class="row-amount">${fmt(s.amount)}</div>`}
        <div style="text-align:right">${daysText}</div>
      </div>
    </div>`;
  }
  html += `<div class="list-row" style="background:rgba(0,0,0,0.02)">
    <div class="row-main" style="font-weight:600">Monthly Total</div>
    <div class="row-right"><div class="row-amount" style="color:var(--red)">${fmt(totalM)}</div></div>
  </div></div>`;

  if (yearly.length) {
    html += `<div class="section-label">Yearly Subscriptions</div><div class="card-list">`;
    for (const s of yearly) {
      const days = daysUntil(s.dueDay||1, s.dueMonth);
      html += `<div class="list-row">
        <div class="row-icon" style="background:rgba(255,204,0,0.15)">${CAT_ICONS[s.cat]||'📱'}</div>
        <div class="row-main">
          <div class="row-title">${s.name}</div>
          <div class="row-sub" style="color:#b8860b">Yearly · Paid in ${MONTHS[s.dueMonth-1]} · ${fmt(s.amount * 12)} annual</div>
        </div>
        <div class="row-right">
          ${editMode
            ? `<input class="edit-input" type="number" value="${s.amount}" onchange="updateSub(${s.id},'amount',+this.value)" inputmode="decimal">`
            : `<div class="row-amount">${fmt(s.amount)}</div>`}
          <div style="font-size:12px;color:${days<=30?'var(--orange)':'var(--text3)'};text-align:right">in ${days}d</div>
        </div>
      </div>`;
    }
    html += `<div class="list-row" style="background:rgba(0,0,0,0.02)">
      <div class="row-main" style="font-weight:600">Yearly Total</div>
      <div class="row-right"><div class="row-amount" style="color:var(--red)">${fmt(totalY)}</div></div>
    </div></div>`;
  }

  html += `<div class="wide-card">
    <div class="wide-card-title">Summary</div>
    <div class="wc-row"><span class="label">Monthly subs</span><span class="val">${fmt(totalM)}</span></div>
    <div class="wc-row"><span class="label">Yearly (avg/mo)</span><span class="val">${fmt(totalY)}</span></div>
    <div class="wc-row" style="font-weight:600"><span class="label">Total/month</span><span class="val" style="color:var(--red)">${fmt(grandMo)}</span></div>
  </div>`;

  return html;
}

// ─── RENDER SETTINGS ──────────────────────────────────────────────────────────
function itemForm(type, item) {
  const isBill = type === 'bill';
  const isEdit = item !== null;
  const prefix = isEdit ? (isBill ? 'eb' : 'es') : (isBill ? 'nb' : 'ns');
  const cats = Object.keys(CAT_ICONS);
  const v = k => isEdit && item[k] != null ? item[k] : '';
  const sel = (k, val) => isEdit && item[k] === val ? 'selected' : '';
  const cancelAction = isEdit ? (isBill ? 'editingBillId=null' : 'editingSubId=null') : (isBill ? 'addingBill=false' : 'addingSub=false');
  const saveAction = isEdit ? `saveEdit('${type}',${item.id})` : `submitNew('${type}')`;
  return `<div class="add-form">
    <div style="font-weight:600;font-size:15px;margin-bottom:10px">${isEdit ? 'Edit' : 'New'} ${isBill ? 'Bill' : 'Subscription'}</div>
    <div class="form-grid full"><div class="form-field">
      <span class="form-label">Name</span>
      <input id="${prefix}-name" class="form-input" type="text" value="${v('name')}" placeholder="e.g. Netflix" autocomplete="off">
    </div></div>
    <div class="form-grid">
      <div class="form-field">
        <span class="form-label">Amount ($/mo avg)</span>
        <input id="${prefix}-amount" class="form-input" type="number" inputmode="decimal" value="${v('amount')}" placeholder="0">
      </div>
      <div class="form-field">
        <span class="form-label">Category</span>
        <select id="${prefix}-cat" class="form-select">
          ${cats.map(c=>`<option value="${c}" ${sel('cat',c)}>${CAT_ICONS[c]} ${c}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-grid">
      ${isBill ? `<div class="form-field">
        <span class="form-label">Person</span>
        <select id="${prefix}-person" class="form-select">
          <option value="papa" ${sel('person','papa')}>${data.names.papa}</option>
          <option value="mama" ${sel('person','mama')}>${data.names.mama}</option>
        </select>
      </div>` : ''}
      <div class="form-field">
        <span class="form-label">Frequency</span>
        <select id="${prefix}-freq" class="form-select">
          <option value="monthly" ${sel('freq','monthly')}>Monthly</option>
          <option value="yearly" ${sel('freq','yearly')}>Yearly</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-field">
        <span class="form-label">Due Day (0 = various)</span>
        <input id="${prefix}-dueday" class="form-input" type="number" inputmode="numeric" value="${isEdit ? item.dueDay : 0}" min="0" max="31">
      </div>
      <div class="form-field">
        <span class="form-label">Due Month (if yearly)</span>
        <select id="${prefix}-duemonth" class="form-select">
          ${MONTHS.map((m,i)=>`<option value="${i+1}" ${isEdit && item.dueMonth===i+1?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="${saveAction}">${isEdit ? 'Save' : 'Add'}</button>
      <button class="btn-cancel" onclick="${cancelAction};render()">Cancel</button>
    </div>
  </div>`;
}

function renderSettings() {
  const xfer = calcExchange();

  // Bills list
  let billRows = data.bills.map(b => {
    if (editingBillId === b.id) return itemForm('bill', b);
    return `<div class="settings-row" style="cursor:pointer" onclick="editingBillId=${b.id};editingSubId=null;render()">
      <div style="flex:1;min-width:0">
        <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.name}</div>
        <div class="hint">${data.names[b.person]} · ${b.freq === 'yearly' ? 'Yearly ('+MONTHS[b.dueMonth-1]+')' : (b.dueDay ? 'Day '+b.dueDay : 'Various')}</div>
      </div>
      <span style="margin-right:4px;font-weight:500">${fmt(b.amount)}</span>
      <button class="del-btn" onclick="event.stopPropagation();deleteBill(${b.id})">−</button>
    </div>`;
  }).join('');

  // Subs list
  let subRows = data.subscriptions.map(s => {
    if (editingSubId === s.id) return itemForm('sub', s);
    return `<div class="settings-row" style="cursor:pointer" onclick="editingSubId=${s.id};editingBillId=null;render()">
      <div style="flex:1;min-width:0">
        <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
        <div class="hint">${s.freq === 'yearly' ? 'Yearly ('+MONTHS[s.dueMonth-1]+')' : (s.dueDay ? 'Day '+s.dueDay : 'Monthly')}</div>
      </div>
      <span style="margin-right:4px;font-weight:500">${fmt(s.amount)}</span>
      <button class="del-btn" onclick="event.stopPropagation();deleteSub(${s.id})">−</button>
    </div>`;
  }).join('');

  return `
  <div class="section-label">Income (Monthly Net)</div>
  <div class="settings-group">
    <div class="settings-row">
      <div style="flex:1;min-width:0">
        <input class="form-input" type="text" value="${data.names.papa}" autocomplete="off" style="font-size:16px;margin-bottom:4px"
          onchange="data.names.papa=this.value.trim()||'Papa';save();render()">
        <div class="hint">Per month</div>
      </div>
      <input class="edit-input" type="number" value="${data.income.papa}" inputmode="decimal"
        onchange="data.income.papa=+this.value;save();render()">
    </div>
    <div class="settings-row">
      <div style="flex:1;min-width:0">
        <input class="form-input" type="text" value="${data.names.mama}" autocomplete="off" style="font-size:16px;margin-bottom:4px"
          onchange="data.names.mama=this.value.trim()||'Mama';save();render()">
        <div class="hint">Per month</div>
      </div>
      <input class="edit-input" type="number" value="${data.income.mama}" inputmode="decimal"
        onchange="data.income.mama=+this.value;save();render()">
    </div>
  </div>

  <div class="section-label">Monthly Transfer</div>
  <div class="settings-group">
    <div class="settings-row">
      <div><div>${xfer >= 0 ? data.names.papa+' → '+data.names.mama : data.names.mama+' → '+data.names.papa}</div><div class="hint">Auto-calculated to equalize balances</div></div>
      <span style="font-size:16px;font-weight:500">${fmt(Math.abs(xfer))}</span>
    </div>
  </div>

  <div class="section-label">Bills</div>
  <div class="settings-group">
    ${billRows}
    ${addingBill ? itemForm('bill', null) : `<button class="btn-add-row" onclick="addingBill=true;render()">＋ Add Bill</button>`}
  </div>

  <div class="section-label">Subscriptions</div>
  <div class="settings-group">
    ${subRows}
    ${addingSub ? itemForm('sub', null) : `<button class="btn-add-row" onclick="addingSub=true;render()">＋ Add Subscription</button>`}
  </div>

  <div class="section-label">App</div>
  <div class="settings-group">
    <div class="settings-row">
      <div><div>Version</div></div>
      <span style="color:var(--text2);font-size:14px">1.0</span>
    </div>
    <div class="settings-row" onclick="resetData()" style="cursor:pointer">
      <div style="color:var(--red)">Reset to Defaults</div>
    </div>
  </div>
  <div style="height:16px"></div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function setBillFilter(f) { billFilter = f; render(); }
function updateBill(id, key, val) {
  const b = data.bills.find(x=>x.id===id);
  if (b) { b[key] = val; save(); }
}
function updateSub(id, key, val) {
  const s = data.subscriptions.find(x=>x.id===id);
  if (s) { s[key] = val; save(); }
}
function deleteBill(id) {
  if (!confirm('Delete this bill?')) return;
  data.bills = data.bills.filter(b => b.id !== id);
  save(); render();
}
function deleteSub(id) {
  if (!confirm('Delete this subscription?')) return;
  data.subscriptions = data.subscriptions.filter(s => s.id !== id);
  save(); render();
}
function submitNew(type) {
  const isBill = type === 'bill';
  const p = isBill ? 'nb' : 'ns';
  const name = document.getElementById(`${p}-name`).value.trim();
  const amount = parseFloat(document.getElementById(`${p}-amount`).value);
  const freq = document.getElementById(`${p}-freq`).value;
  const dueDay = parseInt(document.getElementById(`${p}-dueday`).value) || 0;
  const dueMonth = parseInt(document.getElementById(`${p}-duemonth`).value) || 1;
  const cat = document.getElementById(`${p}-cat`).value;
  if (!name || isNaN(amount) || amount <= 0) { alert('Please enter a name and amount.'); return; }
  if (isBill) {
    const person = document.getElementById(`${p}-person`).value;
    const newId = data.bills.length ? Math.max(...data.bills.map(b=>b.id))+1 : 1;
    const bill = { id:newId, name, amount, dueDay, person, freq, cat, note:'' };
    if (freq === 'yearly') bill.dueMonth = dueMonth;
    data.bills.push(bill);
    addingBill = false;
  } else {
    const newId = data.subscriptions.length ? Math.max(...data.subscriptions.map(s=>s.id))+1 : 1;
    const sub = { id:newId, name, amount, dueDay, freq, cat };
    if (freq === 'yearly') sub.dueMonth = dueMonth;
    data.subscriptions.push(sub);
    addingSub = false;
  }
  save(); render();
}

function saveEdit(type, id) {
  const isBill = type === 'bill';
  const p = isBill ? 'eb' : 'es';
  const name = document.getElementById(p+'-name').value.trim();
  const amount = parseFloat(document.getElementById(p+'-amount').value);
  const freq = document.getElementById(p+'-freq').value;
  const dueDay = parseInt(document.getElementById(p+'-dueday').value) || 0;
  const dueMonth = parseInt(document.getElementById(p+'-duemonth').value) || 1;
  const cat = document.getElementById(p+'-cat').value;
  if (!name || isNaN(amount) || amount <= 0) { alert('Please enter a name and amount.'); return; }
  if (isBill) {
    const person = document.getElementById(p+'-person').value;
    const b = data.bills.find(x => x.id === id);
    if (b) { b.name=name; b.amount=amount; b.freq=freq; b.dueDay=dueDay; b.cat=cat; b.person=person; if (freq==='yearly') b.dueMonth=dueMonth; }
    editingBillId = null;
  } else {
    const s = data.subscriptions.find(x => x.id === id);
    if (s) { s.name=name; s.amount=amount; s.freq=freq; s.dueDay=dueDay; s.cat=cat; if (freq==='yearly') s.dueMonth=dueMonth; }
    editingSubId = null;
  }
  save(); render();
}
function resetData() {
  if (confirm('Reset all data to defaults?')) {
    data = JSON.parse(JSON.stringify(DEFAULTS));
    save(); render();
  }
}

// ─── RENDER DISPATCH ──────────────────────────────────────────────────────────
function render() {
  const titles = { home:'Dashboard', bills:'Bills', subs:'Subscriptions', settings:'Settings' };
  document.getElementById('page-title').textContent = titles[currentTab];
  const showEdit = currentTab !== 'settings';
  document.getElementById('edit-btn').style.visibility = showEdit ? 'visible' : 'hidden';
  const map = { home:renderHome, bills:renderBills, subs:renderSubs, settings:renderSettings };
  document.getElementById('main').innerHTML = (map[currentTab] || renderHome)();
}

render();
</script>
