<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="white"/>

  <!-- Curly tail (left side, behind body) -->
  <path d="M 68 295 C 38 268 34 228 58 215 C 82 202 100 222 88 240 C 78 254 62 247 68 234"
        fill="none" stroke="black" stroke-width="19" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Leg fills (behind body so body overlaps tops) -->
  <rect x="92"  y="418" width="66" height="72" rx="24" fill="#FF79D7"/>
  <rect x="173" y="426" width="66" height="72" rx="24" fill="#FF79D7"/>
  <rect x="256" y="426" width="66" height="72" rx="24" fill="#FF79D7"/>
  <rect x="339" y="418" width="66" height="72" rx="24" fill="#FF79D7"/>

  <!-- Body fill — large, plump, slightly wide oval -->
  <ellipse cx="232" cy="300" rx="175" ry="158" fill="#FF79D7"/>
  <!-- Body belly highlight -->
  <ellipse cx="232" cy="320" rx="110" ry="95" fill="#FFB3E8" opacity="0.5"/>
  <!-- Body outline -->
  <ellipse cx="232" cy="300" rx="175" ry="158" fill="none" stroke="black" stroke-width="18"/>

  <!-- Ear (behind head) -->
  <circle cx="368" cy="152" r="30" fill="#FF79D7"/>
  <circle cx="368" cy="157" r="17" fill="#FFB3E8"/>
  <circle cx="368" cy="152" r="30" fill="none" stroke="black" stroke-width="14"/>

  <!-- Head — notably smaller than body -->
  <circle cx="366" cy="264" r="96" fill="#FF79D7"/>
  <circle cx="366" cy="264" r="96" fill="none" stroke="black" stroke-width="18"/>

  <!-- Coin slot on pig's back -->
  <ellipse cx="218" cy="148" rx="54" ry="16" fill="#222"/>

  <!-- Gold coin dropping into slot -->
  <circle cx="218" cy="83"  r="62" fill="#FFD43B"/>
  <circle cx="218" cy="83"  r="45" fill="none" stroke="#E8A800" stroke-width="7"/>
  <circle cx="218" cy="83"  r="62" fill="none" stroke="black" stroke-width="18"/>

  <!-- Snout — cx+rx = 456+38 = 494, safe inside 512 -->
  <ellipse cx="452" cy="276" rx="38" ry="31" fill="#FFB3E8"/>
  <ellipse cx="452" cy="276" rx="38" ry="31" fill="none" stroke="black" stroke-width="15"/>
  <!-- Nostrils -->
  <circle cx="440" cy="281" r="8" fill="#CC60B0"/>
  <circle cx="463" cy="281" r="8" fill="#CC60B0"/>

  <!-- Eye -->
  <circle cx="418" cy="234" r="13" fill="black"/>
  <circle cx="424" cy="228" r="5"  fill="white"/>

  <!-- Leg outlines -->
  <rect x="92"  y="418" width="66" height="72" rx="24" fill="none" stroke="black" stroke-width="15"/>
  <rect x="173" y="426" width="66" height="72" rx="24" fill="none" stroke="black" stroke-width="15"/>
  <rect x="256" y="426" width="66" height="72" rx="24" fill="none" stroke="black" stroke-width="15"/>
  <rect x="339" y="418" width="66" height="72" rx="24" fill="none" stroke="black" stroke-width="15"/>
</svg>
